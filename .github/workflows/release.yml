name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run tests
      run: go test -v ./...

    - name: Build binaries
      run: |
        # Linux amd64
        GOOS=linux GOARCH=amd64 go build -o ldap-mcp-linux-amd64 -ldflags="-s -w" ./cmd/ldap-mcp

        # Linux arm64
        GOOS=linux GOARCH=arm64 go build -o ldap-mcp-linux-arm64 -ldflags="-s -w" ./cmd/ldap-mcp

        # macOS amd64
        GOOS=darwin GOARCH=amd64 go build -o ldap-mcp-darwin-amd64 -ldflags="-s -w" ./cmd/ldap-mcp

        # macOS arm64 (Apple Silicon)
        GOOS=darwin GOARCH=arm64 go build -o ldap-mcp-darwin-arm64 -ldflags="-s -w" ./cmd/ldap-mcp

        # Windows amd64
        GOOS=windows GOARCH=amd64 go build -o ldap-mcp-windows-amd64.exe -ldflags="-s -w" ./cmd/ldap-mcp

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ldap-mcp-linux-amd64
          ldap-mcp-linux-arm64
          ldap-mcp-darwin-amd64
          ldap-mcp-darwin-arm64
          ldap-mcp-windows-amd64.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
