linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - revive
  disable:
    - staticcheck
    - gocyclo
    - exportloopref

linters-settings:
  revive:
    rules:
      - name: var-naming
        disabled: false
      - name: exported
        disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

run:
  timeout: 5m
  tests: true
